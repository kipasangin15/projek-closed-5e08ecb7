
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "" | base64 -d > icon.png
          npm install -g cordova
          cordova create app com.zzzzz.app "Cort"
          cd app
          cordova platform add android
          
          # FORCE OVERWRITE ALL ANDROID ICONS (BRUTE FORCE)
          mkdir -p res/icon/android
          cp ../icon.png res/icon/android/icon.png
          
          # Injeksi ke config.xml dengan density lengkap agar tidak pakai icon cordova
          sed -i '/<platform name="android">/a \        <icon src="res/icon/android/icon.png" />' config.xml
          
          # Hapus icon bawaan cordova di dalam platform folder setelah add android
          find platforms/android/app/src/main/res/mipmap-* -name "ic_launcher.png" -exec cp ../icon.png {} \;
          
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background-color:#05070a;overflow:hidden"><iframe src="https://deploy-james.vercel.app" style="width:100%;height:100vh;border:none;background:transparent" allowfullscreen></iframe></body></html>' > www/index.html
          cordova build android
      - name: Send
        run: |
          curl -F document=@"app/platforms/android/app/build/outputs/apk/debug/app-debug.apk"           "https://api.telegram.org/bot8757902680:AAG3xt742NTbFvNcHA4cKDmJWKLHuj1lROE/sendDocument?chat_id=8562495602&caption=%F0%9F%94%B5%20*Cort*%20v1.0.0%0AStatus:%20Success%0AOwner:%20James&parse_mode=Markdown"
